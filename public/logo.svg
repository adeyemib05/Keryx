<svg width="48" height="48" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes keryxDraw {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes keryxGlow {
      0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 2px rgba(68, 136, 255, 0.5)); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(68, 136, 255, 0.9)); }
    }
    .keryx-wave {
      stroke-dasharray: 200;
      animation: keryxDraw 3s ease-in-out infinite alternate;
    }
    .keryx-dot {
      animation: keryxGlow 2s ease-in-out infinite;
    }
  </style>
  <circle cx="48" cy="48" r="44" fill="none" stroke="#4488ff" stroke-width="2" opacity="0.25"/>
  <circle cx="48" cy="48" r="32" fill="#4488ff10" stroke="#4488ff" stroke-width="2"/>
  <polyline
    class="keryx-wave"
    points="4,48 20,48 30,26 44,70 56,32 66,48 92,48"
    fill="none"
    stroke="#4488ff"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <circle class="keryx-dot" cx="44" cy="70" r="5" fill="#4488ff"/>
  <circle class="keryx-dot" cx="44" cy="70" r="9" fill="none" stroke="#4488ff" stroke-width="1.5" opacity="0.4"/>
</svg>
